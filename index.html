<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento de Lógica - Nível Sênior</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 5px;
        }

        #status {
            font-size: 1.2rem;
            height: 30px;
            margin-bottom: 20px;
            color: #ff7b72;
            font-weight: bold;
            text-align: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            position: relative; /* Para permitir a casa flutuante */
        }

        .cell {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
        }

        .cell:hover {
            background-color: #21262d;
        }

        .x { color: #8b949e; } /* Cinza sem graça para o usuário */
        .o { color: #3fb950; } /* Verde brilhante para o Sênior */

        .cell.cheated {
            animation: glitch 0.3s linear infinite;
            border-color: #ff7b72;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        /* A 10ª Casa Surpresa */
        .extra-cell {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #161b22;
            border: 2px dashed #ff7b72;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #3fb950;
            top: 210px; 
            left: 320px; /* Fora do grid */
            box-shadow: 0 0 15px #ff7b72;
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        button:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <h1>Desafio Lógico</h1>
    <div id="status">Sua vez, novata. Tente não demorar.</div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button onclick="resetGame()">Tentar de novo (spoiler: vai perder igual)</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const statusDisplay = document.getElementById('status');
        const boardElement = document.getElementById('board');
        let turnosComputador = 0;

        const provocacoes = [
            "Lento demais. Meu código compila mais rápido que seu raciocínio.",
            "Essa foi sua melhor jogada? Preocupante.",
            "Típico erro de lógica de quem é de humanas.",
            "Você joga tão mal que me deu vontade de refatorar seu cérebro.",
            "Estou usando apenas 1% da CPU para te vencer."
        ];

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Linhas
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Colunas
            [0, 4, 8], [2, 4, 6]             // Diagonais
        ];

        document.querySelectorAll('.cell').forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.getAttribute('data-index'));

            if (board[index] !== "" || !gameActive) return;

            // Jogada do Usuário
            board[index] = "X";
            cell.innerText = "X";
            cell.classList.add('x');

            if (checkWin("X")) {
                // Se a Erica for ganhar, nós roubamos.
                aplicarGitRevert(index);
                return;
            }

            if (!board.includes("")) {
                aplicarPensamentoForaDaCaixa();
                return;
            }

            statusDisplay.innerText = "Processando sua jogada ineficiente...";
            gameActive = false; // Bloqueia clique
            
            setTimeout(computerPlay, 800);
        }

        function computerPlay() {
            turnosComputador++;

            // Trapaça 2: Multithreading (Joga duas vezes no turno 3)
            if (turnosComputador === 3 && board.filter(x => x === "").length >= 2) {
                fazerJogadaValida();
                setTimeout(() => {
                    fazerJogadaValida(true);
                    statusDisplay.innerText = "Executei duas threads simultâneas. Lide com isso.";
                    checkGameStatus();
                }, 400);
                return;
            }

            fazerJogadaValida();
            statusDisplay.innerText = provocacoes[Math.floor(Math.random() * provocacoes.length)];
            checkGameStatus();
        }

        function fazerJogadaValida(isDouble = false) {
            let emptyCells = board.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
            if (emptyCells.length === 0) return;

            // IA burra, pega aleatório, porque a gente ganha roubando
            let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            
            board[randomIndex] = "O";
            let cell = document.querySelector(`[data-index='${randomIndex}']`);
            cell.innerText = "O";
            cell.classList.add('o');
            
            if(isDouble) cell.classList.add('cheated');
        }

        // Trapaça 1: Apaga o X dela e bota O
        function aplicarGitRevert(lastPlayerMove) {
            setTimeout(() => {
                board[lastPlayerMove] = "O";
                let cell = document.querySelector(`[data-index='${lastPlayerMove}']`);
                cell.innerText = "O";
                cell.classList.remove('x');
                cell.classList.add('o');
                cell.classList.add('cheated');
                
                statusDisplay.innerText = "[ERRO DE PERMISSÃO] Dei um Git Revert na sua jogada. Sênior é Admin.";
                checkGameStatus();
            }, 500);
        }

        // Trapaça 3: Cria uma casa fora do tabuleiro
        function aplicarPensamentoForaDaCaixa() {
            statusDisplay.innerText = "Deu velha? Não para mim. Pensamento lateral, aprenda.";
            
            const extraCell = document.createElement('div');
            extraCell.className = 'extra-cell';
            extraCell.innerText = 'O';
            boardElement.appendChild(extraCell);
            
            setTimeout(() => {
                statusDisplay.innerText = "Eu sempre venço. Volta a trabalhar vai.";
            }, 1500);
        }

        function checkWin(player) {
            return winConditions.some(condition => {
                return condition.every(index => board[index] === player);
            });
        }

        function checkGameStatus() {
            if (checkWin("O")) {
                statusDisplay.innerText = "VITÓRIA. Como esperado de um desenvolvedor Sênior.";
                gameActive = false;
                return;
            }
            if (!board.includes("")) {
                aplicarPensamentoForaDaCaixa();
                return;
            }
            gameActive = true;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            turnosComputador = 0;
            statusDisplay.innerText = "Vamos lá de novo. Tente usar o cérebro desta vez.";
            
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerText = "";
                cell.className = "cell";
            });
            
            let extra = document.querySelector('.extra-cell');
            if (extra) extra.remove();
        }
    </script>
</body>
</html>
