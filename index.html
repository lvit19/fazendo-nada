<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento de Lógica - Nível Sênior</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 5px;
        }

        #status {
            font-size: 1.2rem;
            height: 30px;
            margin-bottom: 20px;
            color: #ff7b72;
            font-weight: bold;
            text-align: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            position: relative; 
        }

        .cell {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
        }

        .cell:hover { background-color: #21262d; }
        .x { color: #8b949e; }
        .o { color: #3fb950; }

        .cell.cheated {
            animation: glitch 0.3s linear infinite;
            border-color: #ff7b72;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        .extra-cell {
            position: absolute; width: 100px; height: 100px; background-color: #161b22;
            border: 2px dashed #ff7b72; border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 3rem; font-weight: bold; color: #3fb950;
            top: 210px; left: 320px; box-shadow: 0 0 15px #ff7b72; z-index: 5;
        }

        /* --- NOVAS ANIMAÇÕES --- */
        
        /* O Risco da Vitória */
        #strike-line {
            position: absolute;
            background-color: #3fb950;
            height: 8px;
            border-radius: 4px;
            z-index: 10;
            transform-origin: left center;
            display: none;
            box-shadow: 0 0 10px #3fb950;
            /* A largura inicial é 0, a animação preenche */
        }

        @keyframes drawLine {
            from { width: 0; }
            to { width: var(--final-width); }
        }

        /* Tela de Derrota GIGANTE */
        #defeat-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(13, 17, 23, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .defeat-text {
            font-size: 8rem; /* GIGANTE */
            color: #ff7b72;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 123, 114, 0.8);
            transform: scale(5);
            opacity: 0;
            animation: stampIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .defeat-sub {
            font-size: 2rem;
            color: #8b949e;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1s;
        }

        @keyframes stampIn {
            100% { transform: scale(1) rotate(-5deg); opacity: 1; }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Partículas de Confete */
        .confetti {
            position: absolute;
            width: 15px; height: 15px;
            z-index: 99;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        button {
            margin-top: 30px; padding: 10px 20px; background-color: #238636; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold;
            z-index: 101; /* Fica acima da tela de derrota para reiniciar */
        }
        button:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <h1 id="main-title">Desafio Lógico</h1>
    <div id="status">Sua vez, novata. Tente não demorar.</div>
    
    <div class="board" id="board">
        <div id="strike-line"></div>
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button onclick="resetGame()">Reiniciar Ambiente (Você vai perder de novo)</button>

    <!-- Overlay de Derrota -->
    <div id="defeat-screen">
        <div class="defeat-text">DERROTA</div>
        <div class="defeat-sub">A superioridade técnica prevalece.</div>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const statusDisplay = document.getElementById('status');
        const boardElement = document.getElementById('board');
        const strikeLine = document.getElementById('strike-line');
        const defeatScreen = document.getElementById('defeat-screen');
        let turnosComputador = 0;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Linhas
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Colunas
            [0, 4, 8], [2, 4, 6]             // Diagonais
        ];

        // Mapeamento das coordenadas do risco para cada condição de vitória
        const lineStyles = [
            { top: '48px', left: '10px', width: '290px', transform: 'rotate(0deg)' },     // Linha 1
            { top: '153px', left: '10px', width: '290px', transform: 'rotate(0deg)' },    // Linha 2
            { top: '258px', left: '10px', width: '290px', transform: 'rotate(0deg)' },    // Linha 3
            { top: '10px', left: '48px', width: '290px', transform: 'rotate(90deg)' },    // Coluna 1
            { top: '10px', left: '153px', width: '290px', transform: 'rotate(90deg)' },   // Coluna 2
            { top: '10px', left: '258px', width: '290px', transform: 'rotate(90deg)' },   // Coluna 3
            { top: '15px', left: '15px', width: '400px', transform: 'rotate(45deg)' },    // Diagonal Principal
            { top: '15px', left: '295px', width: '400px', transform: 'rotate(135deg)' }   // Diagonal Secundária
        ];

        document.querySelectorAll('.cell').forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.getAttribute('data-index'));

            if (board[index] !== "" || !gameActive) return;

            board[index] = "X";
            cell.innerText = "X";
            cell.classList.add('x');

            if (checkWin("X")) {
                aplicarGitRevert(index);
                return;
            }

            if (!board.includes("")) {
                aplicarPensamentoForaDaCaixa();
                return;
            }

            statusDisplay.innerText = "Processando sua jogada ineficiente...";
            gameActive = false;
            setTimeout(computerPlay, 600);
        }

        function computerPlay() {
            turnosComputador++;

            if (turnosComputador === 3 && board.filter(x => x === "").length >= 2) {
                fazerJogadaValida();
                setTimeout(() => {
                    fazerJogadaValida(true);
                    statusDisplay.innerText = "Executei duas threads simultâneas. Lide com isso.";
                    checkGameStatus();
                }, 300);
                return;
            }

            fazerJogadaValida();
            checkGameStatus();
        }

        function fazerJogadaValida(isDouble = false) {
            let emptyCells = board.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
            if (emptyCells.length === 0) return;

            let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[randomIndex] = "O";
            let cell = document.querySelector(`[data-index='${randomIndex}']`);
            cell.innerText = "O";
            cell.classList.add('o');
            
            if(isDouble) cell.classList.add('cheated');
        }

        function aplicarGitRevert(lastPlayerMove) {
            setTimeout(() => {
                board[lastPlayerMove] = "O";
                let cell = document.querySelector(`[data-index='${lastPlayerMove}']`);
                cell.innerText = "O";
                cell.classList.remove('x');
                cell.classList.add('o', 'cheated');
                
                statusDisplay.innerText = "[ERRO DE PERMISSÃO] Dei um Git Revert na sua jogada. Sênior é Admin.";
                checkGameStatus();
            }, 500);
        }

        function aplicarPensamentoForaDaCaixa() {
            statusDisplay.innerText = "Pensamento lateral aplicado. A vitória é inevitável.";
            const extraCell = document.createElement('div');
            extraCell.className = 'extra-cell';
            extraCell.innerText = 'O';
            boardElement.appendChild(extraCell);
            
            setTimeout(() => { triggerHumiliation(null); }, 1000);
        }

        function checkWin(player) {
            for (let i = 0; i < winConditions.length; i++) {
                if (winConditions[i].every(index => board[index] === player)) {
                    return i; // Retorna o índice da condição vencedora
                }
            }
            return -1;
        }

        function checkGameStatus() {
            let winIndex = checkWin("O");
            if (winIndex !== -1) {
                statusDisplay.innerText = "Sistemas normais. Sênior vence.";
                gameActive = false;
                triggerHumiliation(winIndex);
                return;
            }
            if (!board.includes("")) {
                aplicarPensamentoForaDaCaixa();
                return;
            }
            gameActive = true;
            statusDisplay.innerText = "Sua vez. Tente não passar vergonha.";
        }

        // --- MOTOR DE HUMILHAÇÃO (Animações) ---
        function triggerHumiliation(winComboIndex) {
            gameActive = false;

            // 1. Desenha a linha riscando a velha (se não foi vitória pela casa extra)
            if (winComboIndex !== null) {
                let style = lineStyles[winComboIndex];
                strikeLine.style.top = style.top;
                strikeLine.style.left = style.left;
                strikeLine.style.transform = style.transform;
                strikeLine.style.setProperty('--final-width', style.width);
                strikeLine.style.display = 'block';
                strikeLine.style.animation = 'drawLine 0.5s ease forwards';
            }

            // 2. Espera a linha terminar, aí joga a tela e confetes
            setTimeout(() => {
                defeatScreen.style.display = 'flex';
                shootConfetti();
            }, 800);
        }

        function shootConfetti() {
            const colors = ['#3fb950', '#ff7b72', '#58a6ff', '#f1e05a', '#a371f7'];
            for (let i = 0; i < 150; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(conf);
                
                // Limpa o DOM depois que o confete cair
                setTimeout(() => conf.remove(), 5000);
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            turnosComputador = 0;
            statusDisplay.innerText = "Novo jogo. O resultado será o mesmo.";
            
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerText = "";
                cell.className = "cell";
            });
            
            let extra = document.querySelector('.extra-cell');
            if (extra) extra.remove();
            
            strikeLine.style.display = 'none';
            defeatScreen.style.display = 'none';
            document.querySelectorAll('.confetti').forEach(c => c.remove());
        }
    </script>
</body>
</html>
